services:
  # The durable broker: NATS with JetStream enabled. This is the replayable log
  # between ingest and the consumer pipeline — a `202`-accepted point survives a
  # consumer restart here. (Kafka would play the same role; NATS is pure-Rust on
  # the client side, so the workspace builds without a C toolchain.)
  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    ports:
      - "4205:4222" # client connections
      - "8205:8222" # monitoring / health
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  # The column store: rolled-up metrics land here and are queried back for the
  # dashboard. The rollup schema in migrations/ is mounted into the container's
  # init dir, so a fresh volume auto-applies it on first start.
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8105:8123" # HTTP interface (what the `clickhouse` crate uses)
      - "9005:9000" # native protocol
    volumes:
      - chdata:/var/lib/clickhouse
      - ./migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  natsdata:
  chdata:
