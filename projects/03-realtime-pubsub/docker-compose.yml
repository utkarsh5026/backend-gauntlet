services:
  # The admin-panel roster (people / groups / memberships) — the persistent
  # "hard state" behind the frontend admin UI. Playground scaffolding, NOT part
  # of the pub/sub core: V1–V4 stay store-free. Only needed when DATABASE_URL is
  # set. Host port 5403 per the repo's port convention (postgres → 54NN).
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pubsub
      POSTGRES_PASSWORD: pubsub
      POSTGRES_DB: pubsub
    ports:
      - "5403:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pubsub"]
      interval: 5s
      timeout: 3s
      retries: 5

  # The cross-node bus. A single broadcast is published to a Redis channel so
  # every node — not just the one holding the publishing socket — can fan it out
  # to its local subscribers (V4). Single-node mode (no CLUSTER) ignores this.
  redis:
    image: redis:7-alpine
    ports:
      - "6303:6379"
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Scrapes the app's /metrics every 5s and stores it as time-series, so the
  # monotonic *_total counters can be turned into per-second rates. UI on host
  # :9003 (9090 → 03). Playground observability, NOT the pub/sub core.
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9003:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    # The app runs on the HOST (cargo run), not in this network, so Prometheus
    # reaches it via host.docker.internal. `host-gateway` makes that resolve on
    # native Linux/WSL too, not just Docker Desktop.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Graphs what Prometheus stores. Datasource + dashboard are auto-provisioned
  # from ./observability/grafana, and anonymous admin is on so there's no login.
  # UI on host :3003 (3000 → 03).
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3003:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  promdata:
  grafanadata:
