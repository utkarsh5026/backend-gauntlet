<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-label="Crash outcomes at each phase of a write">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#7f8d84"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="520" fill="#0e1311"/>

  <text x="40" y="44" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#d3ddd6">Kill the power at any moment — what does a reader see?</text>
  <text x="40" y="66" font-family="system-ui, sans-serif" font-size="12" fill="#7f8d84">Four steps, fixed order. No crash can serve half a file.</text>

  <!-- phase cards -->
  <rect x="48" y="96" width="198" height="84" rx="8" fill="#141a17" stroke="#26302b" stroke-width="1.5"/>
  <text x="64" y="124" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#5fb8a1">1 · stream</text>
  <text x="64" y="152" font-family="system-ui, sans-serif" font-size="11" fill="#7f8d84">chunks → a temp file in tmp/</text>

  <rect x="270" y="96" width="198" height="84" rx="8" fill="#141a17" stroke="#26302b" stroke-width="1.5"/>
  <text x="286" y="124" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#5fb8a1">2 · fsync</text>
  <text x="286" y="152" font-family="system-ui, sans-serif" font-size="11" fill="#7f8d84">bytes forced onto the disk</text>

  <rect x="492" y="96" width="198" height="84" rx="8" fill="#141a17" stroke="#26302b" stroke-width="1.5"/>
  <text x="508" y="124" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#5fb8a1">3 · rename + fsync dir</text>
  <text x="508" y="152" font-family="system-ui, sans-serif" font-size="11" fill="#7f8d84">blob appears, fully formed</text>

  <rect x="714" y="96" width="198" height="84" rx="8" fill="#141a17" stroke="#26302b" stroke-width="1.5"/>
  <text x="730" y="124" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#5fb8a1">4 · index write</text>
  <text x="730" y="152" font-family="system-ui, sans-serif" font-size="11" fill="#7f8d84">(bucket, key) → blob</text>

  <!-- timeline -->
  <line x1="48" y1="212" x2="908" y2="212" stroke="#7f8d84" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="147" y1="206" x2="147" y2="218" stroke="#7f8d84" stroke-width="1.5"/>
  <line x1="369" y1="206" x2="369" y2="218" stroke="#7f8d84" stroke-width="1.5"/>
  <line x1="591" y1="206" x2="591" y2="218" stroke="#7f8d84" stroke-width="1.5"/>
  <line x1="813" y1="206" x2="813" y2="218" stroke="#7f8d84" stroke-width="1.5"/>
  <text x="908" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10.5" fill="#7f8d84" text-anchor="end">a PUT's lifetime</text>

  <!-- crash outcomes -->
  <rect x="48" y="244" width="198" height="100" rx="8" fill="#141a17" stroke="#26302b" stroke-width="1.5"/>
  <text x="64" y="272" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#ceac63">⚡ crash here</text>
  <text x="64" y="298" font-family="system-ui, sans-serif" font-size="11.5" font-weight="700" fill="#d3ddd6">reader sees: 404</text>
  <text x="64" y="322" font-family="system-ui, sans-serif" font-size="11" fill="#7f8d84">nameless temp — swept away</text>

  <rect x="270" y="244" width="198" height="100" rx="8" fill="#141a17" stroke="#26302b" stroke-width="1.5"/>
  <text x="286" y="272" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#ceac63">⚡ crash here</text>
  <text x="286" y="298" font-family="system-ui, sans-serif" font-size="11.5" font-weight="700" fill="#d3ddd6">reader sees: 404</text>
  <text x="286" y="322" font-family="system-ui, sans-serif" font-size="11" fill="#7f8d84">durable but invisible — swept</text>

  <rect x="492" y="244" width="198" height="100" rx="8" fill="#141a17" stroke="#26302b" stroke-width="1.5"/>
  <text x="508" y="272" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#ceac63">⚡ crash here</text>
  <text x="508" y="298" font-family="system-ui, sans-serif" font-size="11.5" font-weight="700" fill="#d3ddd6">reader sees: 404</text>
  <text x="508" y="322" font-family="system-ui, sans-serif" font-size="11" fill="#7f8d84">orphan blob — GC reclaims it</text>

  <rect x="714" y="244" width="198" height="100" rx="8" fill="#141a17" stroke="#79b878" stroke-width="1.5"/>
  <text x="730" y="272" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="700" fill="#79b878">✓ completed</text>
  <text x="730" y="298" font-family="system-ui, sans-serif" font-size="11.5" font-weight="700" fill="#d3ddd6">reader sees: the object</text>
  <text x="730" y="322" font-family="system-ui, sans-serif" font-size="11" fill="#7f8d84">whole, byte-for-byte</text>

  <!-- invariant -->
  <rect x="48" y="388" width="864" height="84" rx="8" fill="#141a17" stroke="#26302b" stroke-width="1.5"/>
  <text x="72" y="418" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" fill="#5fb8a1">the invariant</text>
  <text x="72" y="444" font-family="system-ui, sans-serif" font-size="12" fill="#d3ddd6">Bytes become durable before any name points at them — you get the whole object or a 404, never a third thing.</text>
</svg>
