# Browser → this container (/s3/…) → object-store:9000 (S3 path-style).
# Same strip-prefix trick as vite.config.ts in local `bun run dev`.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Multipart / large PUTs stream through; don't buffer whole bodies.
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_http_version 1.1;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location /s3/ {
        proxy_pass http://object-store:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
