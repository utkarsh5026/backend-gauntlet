# Tooling config for the repo's stdlib-only Python scripts (tools/status.py,
# projects/*/makefile.py). No pip dependencies — Ruff is editor/CI lint only.

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.format]
quote-style = "double"

[tool.pyright]
extraPaths = ["tools"]
