version: 2
updates:
  # Rust dependencies — single Cargo workspace, so one entry covers all crates.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Batch low-risk patch/minor bumps into one PR to cut noise.
      rust-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci(deps)"

  # Container images referenced in docker-compose files (postgres, redis, …).
  - package-ecosystem: docker
    directory: "/projects/01-url-shortener"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: docker
    directory: "/projects/02-rate-limiter"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: docker
    directory: "/projects/03-realtime-pubsub"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: docker
    directory: "/projects/04-job-queue"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: docker
    directory: "/projects/05-metrics-pipeline"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
