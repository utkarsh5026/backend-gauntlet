name: Update README status

# Keep the README "Where am I" block in sync with `make status` on every push
# to the default branch. Skips committing when nothing changed (no loop).

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme-status
  cancel-in-progress: true

jobs:
  update-status:
    name: refresh README dashboard
    runs-on: ubuntu-latest
    # Avoid a no-op bounce when this workflow's own commit lands.
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v7
        with:
          # Need the default branch tip so the commit can push cleanly.
          fetch-depth: 0

      - name: Generate status dashboard into README
        run: make status-readme

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "README progress dashboard already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: refresh README progress dashboard [skip ci]"
          git push
