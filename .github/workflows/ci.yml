name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        # NOTE: not using `-D warnings` yet — the scaffold has intentional
        # dead-code warnings from unimplemented `todo!()`s. Flip this to
        # `-- -D warnings` once a project's SPEC is implemented.
        run: cargo clippy --workspace --all-targets
      - name: install cargo-hakari
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hakari
      - name: workspace-hack up to date
        # Fails when a dependency change wasn't followed by `cargo hakari generate`,
        # or a new crate is missing its workspace-hack dep (`cargo hakari manage-deps`).
        run: |
          cargo hakari generate --diff --quiet
          cargo hakari manage-deps --dry-run --quiet

  test:
    name: check + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shortener
          POSTGRES_PASSWORD: shortener
          POSTGRES_DB: shortener
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shortener"
          --health-interval 5s --health-timeout 3s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      DATABASE_URL: postgres://shortener:shortener@localhost:5432/shortener
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # sqlx `query!` macros compile from each project's committed per-project
      # cache (`projects/NN-*/.sqlx/`) with SQLX_OFFLINE=true (set in
      # .cargo/config.toml) — no DB needed to *build*. Regenerate a project's cache
      # with `make prepare` (cargo sqlx prepare -- --all-targets) and commit it; the
      # lint job has no database, so a missing/stale cache fails there.
      - name: check
        run: cargo check --workspace --all-targets
      - name: test
        run: cargo test --workspace
